name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
  pull_request:
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
  workflow_dispatch:

jobs:
  rust:
    name: Check, test, and lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Cargo check (default)
        run: cargo check --all-targets

      - name: Cargo check (verify feature)
        run: cargo check --all-targets --features verify

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test (default — no network)
        run: cargo test --all-targets

      - name: Cargo test (verify feature)
        run: cargo test --all-targets --features verify

      - name: Cargo doc
        run: cargo doc --no-deps --all-features
